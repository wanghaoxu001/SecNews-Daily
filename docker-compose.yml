services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secnews}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secnews_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-secnews}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secnews}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./logs/backend:/app/logs
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-secnews}:${POSTGRES_PASSWORD:-secnews_dev_password}@postgres:5432/${POSTGRES_DB:-secnews}
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-logs/backend.log}
      LOG_FILE_MAX_BYTES: ${LOG_FILE_MAX_BYTES:-10485760}
      LOG_FILE_BACKUP_COUNT: ${LOG_FILE_BACKUP_COUNT:-7}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
